# vim: ft=hyprlang

exec-once = hyprlock #  WARN: IMPORTANT

exec-once = [workspace 2] $terminal start -- $SHELL -lc 'tmux new -As main'
exec-once = [workspace 3 silent] $web_browser
exec-once = systemctl --user start hypridle              # auto lock screen
exec-once = systemctl --user start hyprpaper             # wallpapers 
exec-once = systemctl --user start hyprpolkitagent       # password auth. agent
exec-once = systemctl --user start hyprsunset            # blue filter
exec-once = systemctl --user start dunst                 # notification daemon
exec-once = systemctl --user start waybar                # status bar
exec-once = wl-paste --type text --watch cliphist store  # stores only text data
exec-once = wl-paste --type image --watch cliphist store # stores only image data

# the sleep 2 is for the waybard to start BEFORE all of that
exec-once = sleep 2; openrgb -p ~/.config/OpenRGB/OFF.orp
exec-once = sleep 2; nicotine --hidden
exec-once = sleep 2; easyeffects --hide-window --service-mode
exec-once = sleep 2; signal-desktop
exec-once = sleep 2; element-desktop --hidden
exec-once = sleep 2; Telegram -startintray
# exec-once = sleep 2; viber
exec-once = sleep 2; discord --start-minimized
exec-once = sleep 2; steam -silent
exec-once = sleep 2; mullvad-vpn

exec-once = hyprpm reload -n # load plugins
