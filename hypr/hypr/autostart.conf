# vim: ft=hyprlang

exec-once = hyprlock #  WARN: IMPORTANT

exec-once = [workspace 2] uwsm app -- $terminal start -- $SHELL -lc 'tmux new -As main'
exec-once = [workspace 3 silent] uwsm app -- $web_browser
exec-once = systemctl --user start waybar.service
exec-once = systemctl --user start hypridle        # auto lock screen
exec-once = systemctl --user start hyprpaper       # wallpapers 
exec-once = systemctl --user start hyprpolkitagent # password auth. agent
exec-once = systemctl --user start hyprsunset      # blue filter
exec-once = systemctl --user start dunst           # notification daemon
exec-once = wl-paste --type text  --watch cliphist store  # stores only text data
exec-once = wl-paste --type image --watch cliphist store # stores only image data

exec-once = uwsm app -p After=waybar.service -- openrgb -p ~/.config/OpenRGB/OFF.orp
exec-once = sleep 5s; uwsm app -p After=waybar.service -- easyeffects --hide-window --service-mode
exec-once = uwsm app -p After=waybar.service -- signal-desktop
exec-once = uwsm app -p After=waybar.service -- element-desktop --hidden
exec-once = uwsm app -p After=waybar.service -- Telegram -startintray
exec-once = uwsm app -p After=waybar.service -- discord --start-minimized
exec-once = uwsm app -p After=waybar.service -- steam -silent
exec-once = uwsm app -p After=waybar.service -- mullvad-vpn
exec-once = uwsm app -p After=waybar.service -- jellyfin-mpv-shim

# exec-once = hyprpm reload -n # load plugins
