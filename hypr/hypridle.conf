general {
	lock_cmd = pidof hyprlock || hyprlock      # prevent multiple instances
	before_sleep_cmd = loginctl lock-session   # lock before any suspend
	after_sleep_cmd = hyprctl dispatch dpms on # optional: turn screen back on after resume
}

listener { 
	timeout = 600
	on-timeout = loginctl lock-session
}

listener {
	timeout = 30
	# skip DPMS off if audio is active on HDMI/DisplayPort — turning off the monitor would cut the audio link
	on-timeout = pidof hyprlock && ! pactl list short sinks | awk 'tolower($2) ~ /hdmi|displayport/ && $NF == "RUNNING" {f=1} END {exit !f}' && hyprctl dispatch "hl.dsp.dpms({action = 'off'})"
	on-resume  = hyprctl dispatch "hl.dsp.dpms({action = 'on' })"
	ignore_wayland_inhibit = true
	ignore_dbus_inhibit = true
}
