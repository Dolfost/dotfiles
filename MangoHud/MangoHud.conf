################### LAYOUT ###################
position=top-left
table_columns=3
font_size=20
round_corners=8
background_alpha=0.4
background_color=000000
text_color=ffffff
text_outline=true
text_outline_color=000000
text_outline_thickness=1.5

# only show the discrete Radeon RX 9060XT
pci_dev=0000:03:00.0

# start hidden; toggle with Left Shift + F12
no_display

################### FPS ###################
fps
fps_sampling_period=200
fps_color_change
fps_value=60,120
fps_color=ff0000,ffaa00,00ff00
frametime
frame_timing=1
histogram

################### GPU ###################
gpu_stats
gpu_temp
# gpu_power
# gpu_core_clock
# gpu_mem_clock
vram
gpu_load_change
gpu_load_value=60,90
gpu_load_color=00ff00,ffaa00,ff0000

################### CPU ###################
cpu_stats
cpu_temp
# cpu_power
# cpu_mhz
ram
cpu_load_change
cpu_load_value=60,90
cpu_load_color=00ff00,ffaa00,ff0000

################### SYSTEM ###################
vulkan_driver
wine
gamemode

################### HOTKEYS ###################
toggle_hud=Shift_L+F12
toggle_fps_limit=Shift_L+F1
toggle_logging=Shift_L+F2
reload_cfg=Shift_L+F4
upload_log=Shift_L+F3

################### LOGGING ###################
output_folder=/tmp/mangohud
log_duration=30
log_interval=100
autostart_log=0
