debug: false
headless: false
remote_configuration: false
remote_file_management: true
instance_name: my files
flags:
  no_logo: false
  no_start: false
  no_config_watch: false
  no_connect: false
  no_share_scan: false
  force_share_scan: false
  force_migrations: false
  no_version_check: false
  log_sql: false
  log_unobserved_exceptions: false
  experimental: false
  volatile: false
  case_sensitive_reg_ex: false
  legacy_windows_tcp_keepalive: false
  optimistic_relay_file_info: false
# relay:
#   enabled: false
#   mode: controller # controller (default), agent, or debug (for local development)
#   # controller config is required when running in 'agent' mode
#   # this specifies the relay controller that will be controlling this agent
#   controller:
#     address: https://some.site.com:5000
#     ignore_certificate_errors: false
#     api_key: <a 16-255 character string corresponding to one of the controller's 'readwrite' or 'administrator' API keys>
#     secret: <a 16-255 character shared secret matching the controller's config for this agent>
#     downloads: false
#   # agent config is optional when running in 'controller' mode
#   # this specifies all of the agents capable of connecting
#   agents:
#     my_agent:
#       instance_name: my_agent # make sure the top-level instance_name of the agent matches!
#       secret: <a 16-255 character string unique to this agent>
#       cidr: 0.0.0.0/0,::/0
# permissions:
#   file:
#     mode: ~ # not for Windows, chmod syntax, e.g. 644, 777. can't escalate beyond umask
directories:
  incomplete: /storage/data/soulseek/incomplete
  downloads: /storage/data/soulseek/downloads
shares:
  directories:
    - '[Books]/storage/2.5_inch/media/books'
    - '[Movies]/storage/2.5_inch/media/movies'
    - '[Music]/storage/2.5_inch/media/music'
    - '[Music (mp3)]/storage/2.5_inch/media/old_music'
    - '[Shows]/storage/2.5_inch/media/shows'
    - '[Shows (other hdd)]/storage/3.5_inch/media/shows'
  filters:
    - \.ini$
    - Thumbs.db$
    - \.DS_Store$
  cache:
    storage_mode: memory
    workers: 24
    retention: 10080
transfers:
  upload:
    slots: ~
    speed_limit: 97656 # in kibibytes
    limits:
      queued:
        files: 100
        megabytes: 50000
      daily: ~
        # files: 5000
        # megabytes: 100000
        # failures: 200
      weekly: ~
        # files: 500000
        # megabytes: 5000000
        # failures: 1000
  download:
    slots: 500
    speed_limit: 1000
  groups:
    default:
      upload:
        priority: 500
        strategy: roundrobin
        slots: ~
        limits:
          queued:
            files: ~
            megabytes: ~
          daily: ~ # no daily limits (weekly still apply)
          weekly: ~
            # files: 1500
            # megabytes: 15000
            # failures: 150
    leechers:
      thresholds:
        files: 1
        directories: 1
      upload:
        priority: 999
        strategy: roundrobin
        slots: ~
        speed_limit: ~
        limits:
          queued:
            files: ~
            megabytes: ~
          daily:
            files: ~
            megabytes: ~
            failures: 1000
          weekly:
            files: ~
            megabytes: ~
            failures: 5000
    blacklisted:
      members:
        - coming3744
        - John Streptococcus
        - envizionman
      cidrs:
        - # <CIDR to blacklist, e.g. 255.255.255.255/32>
    user_defined:
      my_buddies:
        upload:
          priority: 250
          strategy: firstinfirstout
          slots: 10
          limits: 
            queued: 
              files: ~
        members:
          - desperain
          - callmeverity
          - leejbarker
          - thampy
          - Elaizes
          - noom
# blacklist:
#   enabled: true
#   file: <path to file containing CIDRs to blacklist>
# filters:
#   search:
#     request:
#       - ^.{1,2}$
rooms:
  - dolfost
  - flac
  - epub
  - lossless
  - Ukraine
  - TV-Land
  - Linux
web:
  port: 5030
  ip_address: '[::]'
  socket: ~
  https:
    disabled: false
    port: 5031
    ip_address: '[::]'
    force: false
    certificate:
      pfx: ~
      password: ~
  url_base: /
  content_path: wwwroot
  logging: false
  authentication:
    disabled: false
    # username: slskd # THIS IS SET AS ENVIROMENT VARIABLES IN SYSTEMD
    # password: slskd
    jwt:
      key: ~
      ttl: 604800000
    api_keys:
      my_api_key:
        key: <some example string between 16 and 255 characters>
        role: readonly # readonly, readwrite, administrator
        cidr: 0.0.0.0/0,::/0
# retention:
#   search: 10080 # 7 days, in minutes
#   transfers:
#     upload:
#       succeeded: 1440 # 1 day, in minutes
#       errored: 30
#       cancelled: 5
#       failed: 180 # any unsuccessful transfer, including errored and cancelled
#     download:
#       succeeded: 1440 # 1 day, in minutes
#       errored: 20160 # 2 weeks, in minutes
#       cancelled: 5
#       failed: 180 # any unsuccessful transfer, including errored and cancelled
#   files:
#     complete: 20160 # 2 weeks, in minutes
#     incomplete: 43200 # 30 days, in minutes
#   logs: 180 # days
# throttling:
#   search:
#     incoming:
#       concurrency: 10 # number of search requests to process at the same time
#       circuit_breaker: 500 # maximum number of pending search requests
#       response_file_limit: 500 # maximum number of files to return in a single search response
# logger:
#   disk: false
#   no_color: false
#   loki: ~
# metrics:
#   enabled: false
#   url: /metrics
#   authentication:
#     disabled: false
#     username: slskd
#     password: slskd
# feature:
#   swagger: false
soulseek:
  address: vps.slsknet.org
  port: 2271
  username: ~ # defined in enviroment variables (systemd)
  password: ~
  description: |
    A slskd user. https://github.com/slskd/slskd
  picture: /storage/2.5_inch/media/gallery/avatars/pink/pink_2048.png
  listen_ip_address: 0.0.0.0
  listen_port: 50300
  diagnostic_level: Info
  distributed_network:
    disabled: false
    disable_children: false
    child_limit: 25
    logging: false
  connection:
    timeout:
      connect: 10000
      inactivity: 15000
      transfer: 30000
    buffer:
      read: 16384
      write: 16384
      transfer: 262144
      write_queue: 250
    proxy:
      enabled: false
      address: ~
      port: ~
      username: ~
      password: ~
