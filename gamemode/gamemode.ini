# Discrete Radeon RX 9060XT is DRM card1 (PCI 03:00.0). card0 is the iGPU.
# Pinning the dGPU to its peak DPM state stops periodic clock downshifts
# during brief frame idles, which were causing stutter after extended play.

[gpu]
apply_gpu_optimisations=accept-responsibility
gpu_device=1
amd_performance_level=high
