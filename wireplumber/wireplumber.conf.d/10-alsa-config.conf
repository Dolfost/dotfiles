monitor.alsa.rules = [
	{
		matches = [
			[
				{ "node.name", "matches", "alsa_output.*Qudelix.*" }
			]
		]
		apply_properties = {
			audio.format = "S24LE"
			audio.rate = 96000
		}
	}
	{
		matches = [
			[
				{ "alsa.name", "matches", "Mi Monitor" }
			]
		]
		apply_properties = {
			audio.format = "S24LE"
			audio.rate = 96000
		}
	}
]
